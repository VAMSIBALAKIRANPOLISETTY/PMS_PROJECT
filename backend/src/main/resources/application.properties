spring.application.name=pms-backend
server.port=8080

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pms_db}
spring.datasource.username=${DATABASE_USERNAME:pms_user}
spring.datasource.password=${DATABASE_PASSWORD:pms_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

pms.cors.allowed-origin=${CORS_ORIGIN:http://localhost:5173}
pms.demo.password=password123
pms.ai.mode=${AI_MODE:mock}
pms.ai.provider=${AI_PROVIDER:}
pms.ai.api-key=${AI_API_KEY:}
pms.ai.model=${AI_MODEL:}
